<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSphere AI | Admin Dashboard</title>
    <!-- Modern Tech Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Tailwind CSS for scalable modern utility styling -->
    <script src="https://tailwindcss.com"></script>
    <!-- ChartJS for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom subtle glassmorphism and tech glow gradients */
        body {
            background-color: #0b0f19;
            font-family: 'Inter', sans-serif;
        }
        .text-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-gradient {
            background: linear-gradient(180deg, #111524 0%, #0d111f 100%);
        }
        .startup-card {
            background: rgba(20, 27, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .startup-card:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 12px 20px -10px rgba(99, 102, 241, 0.15);
        }
        .nav-link {
            transition: all 0.2s ease;
        }
        /* Custom scrollbar for clean dark look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1f293d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
    </style>
</head>
<body class="text-slate-200 antialiased flex min-h-screen overflow-x-hidden">

<!-- SIDEBAR -->
<aside class="w-64 sidebar-gradient h-screen fixed top-0 left-0 border-r border-slate-800/60 p-5 flex flex-col justify-between z-30">
    <div>
        <!-- Startup Logo Branding -->
        <div class="flex items-center gap-3 px-2 py-3 mb-8">
            <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-indigo-500 to-pink-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fa-solid :fa-bolt text-white text-sm"></i>
            </div>
            <span class="font-heading font-extrabold text-xl tracking-tight text-white">Event<span class="text-indigo-400">Sphere</span></span>
        </div>

        <!-- Identical paths and structure to ensure Thymeleaf/Spring MVC matching -->
        <nav class="space-y-1">
            <p class="px-3 text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-2">Main Menu</p>
            <ul>
                <li class="mb-1">
                    <a href="/admin/dashboard" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm text-indigo-400 bg-indigo-500/10 border border-indigo-500/20">
                        <i class="fa-solid fa-chart-pie w-4"></i> Dashboard
                    </a>
                </li>
                <li class="mb-1">
                    <a href="/admin/events" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm text-slate-400 hover:text-slate-100 hover:bg-slate-800/50">
                        <i class="fa-solid fa-calendar-days w-4"></i> Events
                    </a>
                </li>
                <li class="mb-1">
                    <a href="/admin/users" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm text-slate-400 hover:text-slate-100 hover:bg-slate-800/50">
                        <i class="fa-solid fa-users w-4"></i> Users
                    </a>
                </li>
                <li class="mb-1">
                    <a href="/admin/bookings" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm text-slate-400 hover:text-slate-100 hover:bg-slate-800/50">
                        <i class="fa-solid fa-ticket w-4"></i> Bookings
                    </a>
                </li>
                <li class="mb-1">
                    <a href="/admin/venues" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm text-slate-400 hover:text-slate-100 hover:bg-slate-800/50">
                        <i class="fa-solid fa-map-location-dot w-4"></i> Venues
                    </a>
                </li>
                <li class="mb-1">
                    <a href="/admin/categories" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm text-slate-400 hover:text-slate-100 hover:bg-slate-800/50">
                        <i class="fa-solid fa-tags w-4"></i> Categories
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Dynamic User Status Footer Area -->
    <div class="pt-4 border-t border-slate-800/80">
        <div class="flex items-center gap-3 px-2 mb-4">
            <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center font-bold text-xs text-indigo-300 ring-2 ring-slate-800">AD</div>
            <div class="overflow-hidden">
                <p class="text-xs font-semibold text-slate-200 truncate">Admin Controller</p>
                <p class="text-[10px] text-emerald-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 block"></span> Live Mode</p>
            </div>
        </div>
        <a href="/logout" class="nav-link flex items-center justify-center gap-2 w-full px-3 py-2.5 bg-rose-500/10 hover:bg-rose-500 border border-rose-500/20 hover:border-transparent rounded-xl font-medium text-xs text-rose-400 hover:text-white text-center">
            <i class="fa-solid fa-right-from-bracket"></i> Sign Out
        </a>
    </div>
</aside>

<!-- MAIN DASHBOARD CONTENT -->
<main class="ml-64 p-8 w-full min-h-screen flex flex-col box-border">

    <!-- TOP APP BAR -->
    <header class="flex justify-between items-center mb-8 pb-4 border-b border-slate-800/40">
        <div>
            <h1 class="font-heading font-bold text-2xl text-white tracking-tight">Executive Dashboard</h1>
            <p class="text-xs text-slate-400 mt-1">Real-time metrics, pipeline analytics, and platform health.</p>
        </div>

        <!-- Global Action Triggers -->
        <div class="flex items-center gap-4">
            <div class="relative hidden md:block">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                <input type="text" placeholder="Quick search Ctrl+K" class="bg-slate-900/60 border border-slate-800/80 rounded-xl pl-9 pr-4 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-indigo-500/50 w-56">
            </div>
            <button class="relative p-2 bg-slate-900 border border-slate-800 rounded-xl text-slate-400 hover:text-white transition">
                <span class="absolute top-1 right-1 w-2 h-2 bg-indigo-500 rounded-full"></span>
                <i class="fa-regular fa-bell text-sm"></i>
            </button>
        </div>
    </header>

    <!-- KPI ANALYTICS GRID -->
    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
        <!-- Card 1 -->
        <div class="startup-card p-5 rounded-2xl relative overflow-hidden">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Total Booking Value</p>
                    <h3 class="font-heading font-bold text-2xl text-white mt-1">$48,250</h3>
                </div>
                <div class="p-2.5 bg-indigo-500/10 text-indigo-400 rounded-xl border border-indigo-500/10">
                    <i class="fa-solid fa-wallet text-sm"></i>
                </div>
            </div>
            <div class="flex items-center gap-1.5 mt-4 text-xs">
                <span class="text-emerald-400 font-medium flex items-center gap-0.5"><i class="fa-solid fa-arrow-trend-up"></i> +12.4%</span>
                <span class="text-slate-500">vs last month</span>
            </div>
        </div>
        <!-- Card 2 -->
        <div class="startup-card p-5 rounded-2xl relative overflow-hidden">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Active Bookings</p>
                    <h3 class="font-heading font-bold text-2xl text-white mt-1">1,248</h3>
