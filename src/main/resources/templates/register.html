<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFlow - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Arial,sans-serif;
            background:linear-gradient(-45deg,#0f172a,#1d4ed8,#7c3aed,#0891b2);
            background-size:400% 400%;
            animation:bg 12s ease infinite;
        }
        @keyframes bg{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .register-card{
            width:480px;
            padding:40px;
            border-radius:25px;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.2);
            box-shadow:0 18px 45px rgba(0,0,0,.35);
            color:#fff;
        }
        .form-control,.form-select{
            background:rgba(255,255,255,.15);
            border:none;
            color:#fff;
        }
        .form-control::placeholder{color:#ddd}
        .form-control:focus,.form-select:focus{
            background:rgba(255,255,255,.2);
            color:#fff;
            box-shadow:none;
        }
        .form-select option{color:#000}
        .btn-register{
            background:#7c3aed;
            border:none;
            border-radius:30px;
            padding:12px;
            font-weight:bold;
        }
        .btn-register:hover{background:#6d28d9}
        a{color:#fff;text-decoration:none}
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill" style="font-size:55px"></i>
        <h2>Create Account</h2>
        <p>Join EventFlow today</p>
    </div>

    <form action="/register" method="post">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Password" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" name="confirmPassword" placeholder="Confirm Password" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" name="role">
                <option>User</option>
                <option>Organizer</option>
                <option>Admin</option>
            </select>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" required>
            <label class="form-check-label">I agree to the Terms & Conditions</label>
        </div>

        <button class="btn btn-register w-100 text-white">Create Account</button>

        <div class="text-center mt-4">
            Already have an account?
            <a href="/login"><b>Login</b></a>
        </div>

    </form>

</div>

</body>
</html>
