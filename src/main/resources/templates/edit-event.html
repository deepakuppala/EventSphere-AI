<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Event | EventSphere AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .container{
            width:900px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 50px rgba(0,0,0,.4);
        }

        h1{
            color:white;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            color:white;
            margin-bottom:8px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:10px;
            background:#334155;
            color:white;
        }

        textarea{
            height:120px;
            resize:none;
        }

        .row{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:18px;
            cursor:pointer;
            margin-top:25px;
        }

        button:hover{
            background:#1d4ed8;
        }

        img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:12px;
            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>
        <i class="fa-solid fa-pen-to-square"></i>
        Edit Event
    </h1>

    <form th:action="@{/admin/events/update}"
          th:object="${event}"
          method="post">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{id}">

        <div class="form-group">

            <label>Event Name</label>

            <input type="text"
                   th:field="*{eventName}"
                   required>

        </div>

        <div class="form-group">

            <label>Description</label>

            <textarea th:field="*{description}"></textarea>

        </div>

        <div class="row">

            <div class="form-group">

                <label>Date</label>

                <input type="date"
                       th:field="*{eventDate}">

            </div>

            <div class="form-group">

                <label>Time</label>

                <input type="time"
                       th:field="*{eventTime}">

            </div>

        </div>

        <div class="row">

            <div class="form-group">

                <label>Ticket Price</label>

                <input type="number"
                       th:field="*{ticketPrice}">

            </div>

            <div class="form-group">

                <label>Total Seats</label>

                <input type="number"
                       th:field="*{totalSeats}">

            </div>

        </div>

        <div class="row">

            <div class="form-group">

                <label>Available Seats</label>

                <input type="number"
                       th:field="*{availableSeats}">

            </div>

            <div class="form-group">

                <label>Organizer</label>

                <input type="text"
                       th:field="*{organizer}">

            </div>

        </div>

        <div class="form-group">

            <label>Image URL</label>

            <input type="text"
                   id="imageUrl"
                   th:field="*{imageUrl}"
                   onkeyup="previewImage()">

            <img id="preview"
                 th:src="*{imageUrl}">

        </div>

        <div class="row">

            <div class="form-group">

                <label>Status</label>

                <select th:field="*{status}">

                    <option value="Upcoming">Upcoming</option>

                    <option value="Completed">Completed</option>

                    <option value="Cancelled">Cancelled</option>

                </select>

            </div>

            <div class="form-group">

                <label>Venue</label>

                <select th:field="*{venue.id}" required>

                    <option value="">Select Venue</option>

                    <option
                            th:each="venue : ${venues}"
                            th:value="${venue.id}"
                            th:text="${venue.venueName}">
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Category</label>

                <select th:field="*{category.id}" required>

                    <option value="">Select Category</option>

                    <option
                            th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.categoryName}">
                    </option>

                </select>

            </div>

        <button type="submit">

            <i class="fa-solid fa-floppy-disk"></i>

            Update Event

        </button>

    </form>

</div>

<script>

    function previewImage(){

        const url=document.getElementById("imageUrl").value;

        document.getElementById("preview").src=url;

    }

</script>

</body>
</html>
