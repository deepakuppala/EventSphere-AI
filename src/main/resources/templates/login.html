<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFlow - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(-45deg,#0f172a,#2563eb,#7c3aed,#06b6d4);
            background-size:400% 400%;
            animation:bg 12s ease infinite;

        }

        @keyframes bg{

            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}

        }

        .login-card{

            width:420px;
            padding:40px;
            border-radius:25px;

            background:rgba(255,255,255,.12);
            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.2);

            box-shadow:0 15px 40px rgba(0,0,0,.35);

            color:white;

        }

        .form-control{

            background:rgba(255,255,255,.15);
            color:white;
            border:none;

        }

        .form-control::placeholder{

            color:#ddd;

        }

        .form-control:focus{

            background:rgba(255,255,255,.2);
            color:white;
            box-shadow:none;

        }

        .btn-login{

            background:#7c3aed;
            border:none;
            border-radius:30px;
            padding:12px;
            font-weight:bold;

        }

        .btn-login:hover{

            background:#6d28d9;

        }

        a{

            color:white;
            text-decoration:none;

        }

        a:hover{

            color:#ffc107;

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="text-center mb-4">

        <i class="bi bi-calendar-event-fill" style="font-size:60px;"></i>

        <h2 class="mt-3">Welcome Back</h2>

        <p>Sign in to EventFlow</p>

    </div>

    <form action="/login" method="post">

        <div class="mb-3">

            <label>Email</label>

            <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter Email"
                    required>

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter Password"
                    required>

        </div>

        <!-- Error Message -->
        <div class="text-center mb-3">

            <p
                    th:if="${error}"
                    th:text="${error}"
                    style="color:#ff6b6b;font-weight:bold;">
            </p>

        </div>

        <div class="d-flex justify-content-between mb-3">

            <div>

                <input type="checkbox">

                Remember Me

            </div>

            <a href="#">Forgot Password?</a>

        </div>

        <button
                type="submit"
                class="btn btn-login w-100 text-white">

            Login

        </button>

        <div class="text-center mt-4">

            Don't have an account?

            <a href="/register">

                <b>Register</b>

            </a>

        </div>

    </form>

</div>

</body>
</html>
