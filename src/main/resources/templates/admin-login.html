<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | EventSphere AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(-45deg,#0f172a,#1d4ed8,#7c3aed,#0891b2);
            background-size:400% 400%;
            animation:bg 12s ease infinite;

        }

        @keyframes bg{

            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}

        }

        .login-box{

            width:420px;

            background:rgba(255,255,255,.12);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.2);

            border-radius:25px;

            padding:40px;

            box-shadow:0 20px 50px rgba(0,0,0,.4);

            color:white;

        }

        .icon{

            text-align:center;

            font-size:60px;

            color:#facc15;

            margin-bottom:15px;

        }

        h1{

            text-align:center;

            margin-bottom:30px;

        }

        label{

            display:block;

            margin-bottom:8px;

            margin-top:15px;

            font-weight:500;

        }

        input{

            width:100%;

            padding:14px;

            border:none;

            border-radius:12px;

            outline:none;

            font-size:16px;

        }

        button{

            width:100%;

            margin-top:30px;

            padding:15px;

            border:none;

            border-radius:12px;

            background:#2563eb;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#1d4ed8;

            transform:translateY(-2px);

        }

        .error{

            background:#dc2626;

            padding:10px;

            border-radius:8px;

            text-align:center;

            margin-bottom:15px;

        }

        .back{

            display:block;

            text-align:center;

            margin-top:20px;

            color:white;

            text-decoration:none;

        }

        .back:hover{

            color:#facc15;

        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="icon">

        <i class="fa-solid fa-user-shield"></i>

    </div>

    <h1>Admin Login</h1>

    <div class="error"
         th:if="${error}"
         th:text="${error}">
    </div>

    <form th:action="@{/admin/login}" method="post">

        <label>Username</label>

        <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

        <label>Password</label>

        <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

        <button type="submit">

            <i class="fa-solid fa-right-to-bracket"></i>

            Login

        </button>

    </form>

    <a href="/" class="back">

        <i class="fa-solid fa-arrow-left"></i>

        Back to Home

    </a>

</div>

</body>

</html>
