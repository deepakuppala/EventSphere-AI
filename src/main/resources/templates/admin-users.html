<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Users | EventSphere Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            display:flex;
            background:#0f172a;
            color:#fff;
        }

        .sidebar{
            width:260px;
            height:100vh;
            background:#111827;
            position:fixed;
            padding:25px;
        }

        .logo{
            font-size:32px;
            font-weight:bold;
            color:#38bdf8;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin:8px 0;
            border-radius:10px;
            transition:.3s;
        }

        .sidebar a:hover{
            background:#2563eb;
        }

        .logout{
            background:#dc2626;
            margin-top:30px;
        }

        .content{
            margin-left:260px;
            width:100%;
            padding:40px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .search{
            width:350px;
            padding:12px;
            border:none;
            border-radius:12px;
            background:#1e293b;
            color:white;
            outline:none;
        }

        .card{
            background:#1e293b;
            padding:25px;
            border-radius:16px;
            margin-bottom:25px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#2563eb;
            padding:16px;
        }

        td{
            background:#1e293b;
            padding:16px;
            text-align:center;
            border-bottom:1px solid #334155;
        }

        tr:hover td{
            background:#273549;
        }

        .delete{
            background:#ef4444;
            color:white;
            padding:8px 15px;
            border-radius:8px;
            text-decoration:none;
        }

        .delete:hover{
            background:#dc2626;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        🎉 EventSphere
    </div>

    <a href="/admin/dashboard"><i class="fa-solid fa-house"></i> Dashboard</a>
    <a href="/admin/events"><i class="fa-solid fa-calendar"></i> Events</a>
    <a href="/admin/users"><i class="fa-solid fa-users"></i> Users</a>
    <a href="/admin/bookings"><i class="fa-solid fa-ticket"></i> Bookings</a>
    <a href="/admin/venues"><i class="fa-solid fa-location-dot"></i> Venues</a>
    <a href="/admin/categories"><i class="fa-solid fa-layer-group"></i> Categories</a>
    <a href="/admin/payments"><i class="fa-solid fa-credit-card"></i> Payments</a>
    <a href="/admin/reports"><i class="fa-solid fa-chart-line"></i> Reports</a>
    <a href="/admin/settings"><i class="fa-solid fa-gear"></i> Settings</a>

    <a href="/admin/logout" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>

</div>

<div class="content">

    <div class="topbar">

        <div>

            <h1>👥 User Management</h1>

            <p>Manage all registered users.</p>

        </div>

        <input type="text"
               id="search"
               class="search"
               placeholder="Search User...">

    </div>

    <div class="card">

        <h2>
            Total Users :
            <span th:text="${#lists.size(users)}"></span>
        </h2>

    </div>
    <div class="card">

        <table id="userTable">

            <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Phone</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="user : ${users}">

                <td th:text="${user.id}"></td>

                <td th:text="${user.name}"></td>

                <td th:text="${user.email}"></td>

                <td th:text="${user.phone}"></td>

                <td>

                    <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                       class="delete"
                       onclick="return confirm('Delete this user?')">

                        <i class="fa-solid fa-trash"></i>

                        Delete

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>
    <script>

        const search=document.getElementById("search");

        search.addEventListener("keyup",function(){

            let value=this.value.toLowerCase();

            let rows=document.querySelectorAll("#userTable tbody tr");

            rows.forEach(function(row){

                let text=row.innerText.toLowerCase();

                if(text.includes(value)){

                    row.style.display="";

                }else{

                    row.style.display="none";

                }

            });

        });

    </script>

</div>

</body>

</html>
