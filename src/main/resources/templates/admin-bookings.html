<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Booking Management | EventSphere AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
        }

        .container{
            padding:40px;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:35px;
        }

        .header h1{
            font-size:32px;
        }

        .search-box{
            position:relative;
        }

        .search-box input{

            width:320px;
            padding:14px 20px;
            padding-left:45px;
            border:none;
            border-radius:10px;
            background:#1e293b;
            color:white;

        }

        .search-box i{

            position:absolute;
            left:15px;
            top:16px;
            color:#94a3b8;

        }

        .cards{

            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-bottom:35px;

        }

        .card{

            background:#1e293b;
            padding:25px;
            border-radius:15px;
            transition:.3s;

        }

        .card:hover{

            transform:translateY(-5px);

        }

        .card h2{

            font-size:34px;
            margin-bottom:10px;
            color:#38bdf8;

        }

        .card p{

            color:#cbd5e1;

        }

        .table-container{

            background:#1e293b;
            padding:20px;
            border-radius:15px;
            overflow-x:auto;

        }

        table{

            width:100%;
            border-collapse:collapse;

        }

        thead{

            background:#2563eb;

        }

        th{

            padding:18px;
            text-align:center;

        }

        td{

            padding:18px;
            text-align:center;
            border-bottom:1px solid #334155;

        }

        tbody tr:hover{

            background:#273449;

        }

        .status{

            padding:8px 15px;
            border-radius:30px;
            font-size:13px;
            font-weight:600;

        }

        .confirmed{

            background:#22c55e;
            color:white;

        }

        .cancelled{

            background:#ef4444;
            color:white;

        }

        .pending{

            background:#f59e0b;
            color:white;

        }

        .delete-btn{

            background:#ef4444;
            padding:10px 16px;
            border-radius:8px;
            color:white;
            text-decoration:none;
            transition:.3s;

        }

        .delete-btn:hover{

            background:#dc2626;

        }

        @media(max-width:900px){

            .cards{

                grid-template-columns:repeat(2,1fr);

            }

        }

        @media(max-width:600px){

            .cards{

                grid-template-columns:1fr;

            }

            .header{

                flex-direction:column;
                gap:20px;

            }

            .search-box input{

                width:100%;

            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>

            <i class="fa-solid fa-ticket"></i>

            Booking Management

        </h1>

        <div class="search-box">

            <i class="fa-solid fa-search"></i>

            <input
                    type="text"
                    id="search"
                    placeholder="Search booking..."
                    onkeyup="searchBooking()">

        </div>

    </div>

    <div class="cards">

        <div class="card">

            <h2 th:text="${bookings.size()}">0</h2>

            <p>Total Bookings</p>

        </div>

        <div class="card">

            <h2 th:text="${bookings.size()}">0</h2>

            <p>Confirmed</p>

        </div>

        <div class="card">

            <h2>₹245K</h2>

            <p>Total Revenue</p>

        </div>

        <div class="card">

            <h2>12</h2>

            <p>Today's Bookings</p>

        </div>

    </div>

    <div class="table-container">

        <table id="bookingTable">

            <thead>

            <tr>

                <th>ID</th>

                <th>User</th>

                <th>Event</th>

                <th>Tickets</th>

                <th>Amount</th>

                <th>Status</th>

                <th>Date</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody>
            <tr th:each="booking : ${bookings}">

                <td th:text="${booking.bookingId}"></td>

                <td th:text="${booking.user.name}"></td>

                <td th:text="${booking.event.eventName}"></td>

                <td th:text="${booking.numberOfTickets}"></td>

                <td>
                    ₹<span th:text="${booking.totalAmount}"></span>
                </td>

                <td>

        <span class="status confirmed"
              th:if="${booking.bookingStatus=='CONFIRMED'}">
            Confirmed
        </span>

                    <span class="status pending"
                          th:if="${booking.bookingStatus=='PENDING'}">
            Pending
        </span>

                    <span class="status cancelled"
                          th:if="${booking.bookingStatus=='CANCELLED'}">
            Cancelled
        </span>

                </td>

                <td th:text="${#temporals.format(booking.bookingDate,'dd-MM-yyyy HH:mm')}"></td>

                <td>

                    <a class="delete-btn"
                       th:href="@{'/admin/bookings/delete/' + ${booking.bookingId}}"
                       onclick="return confirm('Delete this booking?')">

                        <i class="fa-solid fa-trash"></i>

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

    function searchBooking(){

        let input =
            document.getElementById("search").value.toLowerCase();

        let rows =
            document.querySelectorAll("#bookingTable tbody tr");

        rows.forEach(row=>{

            let text =
                row.innerText.toLowerCase();

            if(text.includes(input)){

                row.style.display="";

            }else{

                row.style.display="none";

            }

        });

    }

</script>

</body>

</html>
