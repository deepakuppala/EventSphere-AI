<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EventSphere | Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Poppins,sans-serif;
        }

        .navbar{
            background:#111827;
        }

        .navbar-brand{
            font-size:30px;
            font-weight:bold;
        }

        .hero{
            height:300px;
            background:url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1600&q=80");
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .hero::before{
            content:"";
            position:absolute;
            width:100%;
            height:300px;
            background:rgba(0,0,0,.55);
        }

        .hero h1,
        .hero p{
            position:relative;
            z-index:1;
        }

        .card{

            background:#1e293b;
            border:none;
            border-radius:20px;
            color:white;
            transition:.3s;

        }

        .card:hover{

            transform:translateY(-8px);

        }

        .card img{

            height:220px;
            object-fit:cover;

            border-radius:20px 20px 0 0;

        }

        .price{

            font-size:22px;
            color:#38bdf8;
            font-weight:bold;

        }

        .btn-book{

            background:#2563eb;
            color:white;
            border:none;

        }

        .btn-book:hover{

            background:#1d4ed8;

        }

        footer{

            background:#111827;
            padding:30px;
            text-align:center;
            margin-top:60px;

        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand" href="/">

            🎉 EventSphere

        </a>

        <div>

            <a href="/" class="btn btn-outline-light me-2">

                Home

            </a>

            <a href="/dashboard" class="btn btn-outline-light me-2">

                Dashboard

            </a>

            <a href="/login" class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

</nav>

<section class="hero">

    <h1 class="display-3 fw-bold">

        Upcoming Events

    </h1>

    <p class="lead">

        Discover Amazing Events Near You

    </p>

</section>

<div class="container py-5">

    <div class="row g-4">

        <div class="col-lg-4 col-md-6"

             th:each="event : ${events}">

            <div class="card h-100">

                <img th:src="${event.imageUrl}"
                     alt="Event Image">

                <div class="card-body">

                    <h3 th:text="${event.eventName}"></h3>

                    <p class="text-light"

                       th:text="${event.description}"></p>

                    <p>

                        <i class="bi bi-calendar-event"></i>

                        <span th:text="${event.eventDate}"></span>

                    </p>

                    <p>

                        <i class="bi bi-clock"></i>

                        <span th:text="${event.eventTime}"></span>

                    </p>

                    <p>

                        <i class="bi bi-person"></i>

                        <span th:text="${event.organizer}"></span>

                    </p>

                    <p>

                        Seats :

                        <span th:text="${event.availableSeats}"></span>

                        /

                        <span th:text="${event.totalSeats}"></span>

                    </p>

                    <div class="d-flex justify-content-between align-items-center">

                        <div class="price">

                            ₹<span th:text="${event.ticketPrice}"></span>

                        </div>

                        <a th:href="@{/booking/{id}(id=${event.id})}"

                           class="btn btn-book">

                            Book Now

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<footer>

    <h4>

        EventSphere AI

    </h4>

    <p>

        Book Events • Enjoy Experiences

    </p>

</footer>

</body>

</html>
